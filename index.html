<script>
/* ── 核心后端对接逻辑 ── */
const API_BASE = ''; // 保持为空，自动指向当前域名

// 1. 修改原有的获取数据函数，使其从 Vercel 读取
async function vpFetchData() {
  try {
    const res = await fetch('/api/session', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'get_results' })
    });
    const data = await res.json();
    
    // 【关键】将云端数据同步到你原有的 VP 状态对象中
    // 假设你原有的投票对象叫 VP.votes
    VP.votes = data.votes || {};
    // 假设你原有的论点数组叫 VP.arguments
    VP.arguments = data.args || [];
    
    // 调用你原有的渲染函数，让界面更新
    vpRenderOptions(); 
    vpRenderArguments();
    
    console.log("云端同步成功:", data);
  } catch (e) {
    console.error("同步失败:", e);
  }
}

// 2. 修改 AI 调用函数，确保 API Key 安全
async function vpAskAI(prompt) {
  try {
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        messages: [
          {role: "system", content: "你是一位历史专家，请以道光皇帝或林则徐的口吻回答。"},
          {role: "user", content: prompt}
        ]
      })
    });
    const data = await res.json();
    return data.choices[0].message.content;
  } catch (e) {
    return "奏折在传递途中受阻（AI连接失败）";
  }
}

// 3. 修改二维码生成，自动适配 Vercel 域名
function vpShowQR(type) {
  // 自动获取当前网址并指向 vote.html
  const url = window.location.origin + '/vote.html';
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}`;
  
  // 对应你原版的 DOM 元素 ID
  const qrImg = document.getElementById('spQRImg');
  const qrTxt = document.getElementById('spQRUrl');
  if(qrImg) qrImg.src = qrUrl;
  if(qrTxt) qrTxt.textContent = "学生扫码直接参与";
  
  document.getElementById('spQR').style.display = 'flex';
}

// 4. 新增：重置按钮逻辑（如果你需要清空课堂数据）
async function vpResetSession() {
  if(!confirm("确定要开启新的一课并清空当前数据吗？")) return;
  await fetch('/api/session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ action: 'reset' })
  });
  vpFetchData();
}
</script>
